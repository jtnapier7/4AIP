document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"836c1bf5-27af-47fa-b9de-aa65a41f8864\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<link rel=\"preconnect\" href=\"https://api.fontshare.com\">\n<link rel=\"stylesheet\" href=\"https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&amp;display=swap\">\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  @keyframes barIn{from{transform:scaleY(0)}to{transform:scaleY(1)}}\n  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}\n<\u002Fstyle>\n<script>\n  (function(){\n    if (window.parent === window) return;\n    var post = function(){ try { parent.postMessage({ __dashHeight: Math.ceil(document.documentElement.scrollHeight) }, '*'); } catch(e){} };\n    window.addEventListener('load', post);\n    window.addEventListener('resize', post);\n    try { new ResizeObserver(post).observe(document.documentElement); } catch(e){}\n    setInterval(post, 1000);\n  })();\n<\u002Fscript>\n<\u002Fhelmet>\n<div style=\"min-height:100%;background:radial-gradient(1100px 560px at 88% -12%, rgba(75,13,128,0.07), transparent 60%),#ffffff;color:#1d2333;font-family:'Satoshi',system-ui,sans-serif;padding:clamp(20px,3vw,40px);\">\n\n  <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;\">\n    <div>\n      <div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a6fa6;font-weight:700;margin-bottom:8px;\">Business Health · FY Snapshot<\u002Fdiv>\n      <div style=\"font-size:clamp(26px,3.4vw,40px);font-weight:900;letter-spacing:-.02em;line-height:1;\">Financial Performance<\u002Fdiv>\n      <div style=\"margin-top:10px;font-size:14px;color:#5b6678;max-width:560px;\">Each driver charts <strong style=\"color:#4b0d80;font-weight:700;\">Last Year · Target · Year-to-Date · Forecast<\u002Fstrong>, colored by where it stands against goal.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n      <sc-for list=\"{{ legend }}\" as=\"leg\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;background:#f7f5fb;border:1px solid #ebe6f2;font-size:12.5px;font-weight:600;color:#4a5568;\">\n          <span style=\"{{ leg.dotStyle }}\"><\u002Fspan>{{ leg.label }}\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-for list=\"{{ sections }}\" as=\"section\" hint-placeholder-count=\"2\">\n    <div style=\"margin-bottom:34px;\">\n      <div style=\"{{ section.bannerStyle }}\">\n        <span style=\"font-size:14px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;\">{{ section.title }}<\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;opacity:.85;\">{{ section.count }} drivers<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:16px;\">\n        <sc-for list=\"{{ section.metrics }}\" as=\"metric\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;flex-direction:column;gap:14px;padding:16px 16px 14px;border-radius:16px;background:#ffffff;border:1px solid #ebe7f1;box-shadow:0 14px 30px -22px rgba(43,21,68,0.45);transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;animation:fade .5s ease both;\" style-hover=\"display:flex;flex-direction:column;gap:14px;padding:16px 16px 14px;border-radius:16px;background:#ffffff;border:1px solid #d8cce8;box-shadow:0 22px 40px -20px rgba(75,13,128,0.32);transform:translateY(-3px);\">\n\n            <div style=\"display:flex;align-items:flex-start;gap:8px;min-height:38px;\">\n              <div style=\"flex:1;font-size:13.5px;font-weight:700;letter-spacing:-.01em;line-height:1.25;\">{{ metric.name }}<\u002Fdiv>\n              <span style=\"{{ metric.pillStyle }}\">{{ metric.statusLabel }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ metric.hasData }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <div style=\"position:relative;display:flex;gap:8px;align-items:flex-end;height:{{ chartHpx }};padding-top:6px;\">\n                  <sc-if value=\"{{ metric.showLine }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"{{ metric.lineStyle }}\"><\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-for list=\"{{ metric.bars }}\" as=\"bar\" hint-placeholder-count=\"4\">\n                    <div style=\"flex:1;height:100%;position:relative;background:rgba(75,13,128,0.06);border-radius:5px;\">\n                      <div style=\"{{ bar.fillStyle }}\"><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:8px;margin-top:8px;\">\n                  <sc-for list=\"{{ metric.bars }}\" as=\"bar\" hint-placeholder-count=\"4\">\n                    <div style=\"flex:1;text-align:center;font-size:10px;font-weight:700;letter-spacing:.04em;color:#8b93a5;\">{{ bar.short }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ metric.noData }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"height:{{ chartHpx }};display:flex;align-items:center;justify-content:center;border-radius:8px;background:#faf8fc;border:1px dashed #ddd4e8;font-size:12px;color:#9aa1b2;font-weight:600;\">Not tracked<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"display:flex;flex-direction:column;gap:1px;border-top:1px solid #eee9f3;padding-top:10px;\">\n              <sc-for list=\"{{ metric.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                <div style=\"{{ row.rowStyle }}\">\n                  <span style=\"{{ row.labelStyle }}\">{{ row.label }}<\u002Fspan>\n                  <span style=\"font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;\">{{ row.value }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1320, &quot;height&quot;: 820 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#4b0d80&quot;, &quot;options&quot;: [&quot;#4b0d80&quot;, &quot;#2f86ff&quot;, &quot;#16a34a&quot;, &quot;#b91c5c&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Style&quot; },\n  &quot;showTargetLine&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Style&quot; },\n  &quot;chartHeight&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 96, &quot;min&quot;: 60, &quot;max&quot;: 160, &quot;step&quot;: 4, &quot;unit&quot;: &quot;px&quot;, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Style&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const accent = this.props.accent ?? '#4b0d80';\n    const showTargetLine = this.props.showTargetLine ?? true;\n    const chartHeight = this.props.chartHeight ?? 96;\n\n    const SOLID = { green:'#16a34a', amber:'#e0890a', red:'#dc2626' };\n    const RGB   = { green:'22,163,74', amber:'224,137,10', red:'220,38,38' };\n    const STAT  = { green:'On Track', amber:'Watch', red:'Off Track' };\n\n    const fmt = (type, v) => {\n      if (v === null || v === undefined) return '\\u2013';\n      const neg = v < 0, a = Math.abs(v);\n      if (type === 'pct') return (neg ? '-' : '') + a + '%';\n      if (type === 'cur') { const s = '$' + a.toLocaleString('en-US'); return neg ? '(' + s + ')' : s; }\n      return (neg ? '-' : '') + a.toLocaleString('en-US');\n    };\n\n    const RAW = [\n      { title: 'Profit Drivers', metrics: [\n        { name:'Total Jobs',               status:'green', type:'num', ly:152,    tg:215,    ytd:59,    fc:187 },\n        { name:'Avg. Job Value',           status:'amber', type:'cur', ly:6914,   tg:6535,   ytd:5770,  fc:5770 },\n        { name:'COS (% of Revenue)',       status:'red',   type:'pct', ly:31,     tg:25,     ytd:36,    fc:36 },\n        { name:'Payroll Expenses',         status:'green', type:'cur', ly:472101, tg:600000, ytd:166580,fc:502580 },\n        { name:'Mkt Expenses (% of Rev.)', status:'green', type:'pct', ly:0,      tg:5,      ytd:5,     fc:5 },\n        { name:'Overhead Expenses',        status:'green', type:'cur', ly:103635, tg:125000, ytd:54797, fc:134797 },\n      ]},\n      { title: 'Cash Flow Drivers', metrics: [\n        { name:'Days Sales Outstanding',         status:'green', type:'num', ly:41,      tg:30,      ytd:105,    fc:91 },\n        { name:'Days Inv. Outstanding',          status:'green', type:'num', ly:null,    tg:null,    ytd:null,   fc:null },\n        { name:'Sale (Purchase) of Assets',      status:'green', type:'cur', ly:-2850,   tg:-25000,  ytd:-9645,  fc:-29645 },\n        { name:'Days Payable Outstanding',       status:'amber', type:'num', ly:20,      tg:30,      ytd:16,     fc:17 },\n        { name:'Debt Additions (Repayments)',    status:'green', type:'cur', ly:175162,  tg:30000,   ytd:72747,  fc:14973 },\n        { name:\"Owners' Investments (Draws)\",    status:'green', type:'cur', ly:-110535, tg:-110535, ytd:-31550, fc:-97950 },\n      ]},\n    ];\n\n    const order = [['ly','LY','Last Year'],['tg','TGT','Target'],['ytd','YTD','Year-to-Date'],['fc','FC','Forecast']];\n    const SCALE = 80;\n\n    const sections = RAW.map(sec => ({\n      title: sec.title,\n      count: sec.metrics.length,\n      bannerStyle: {\n        display:'flex', alignItems:'center', justifyContent:'space-between',\n        padding:'11px 18px', borderRadius:'12px', marginBottom:'16px', color:'#fff',\n        background:`linear-gradient(180deg, rgba(255,255,255,0.12), rgba(0,0,0,0.10)), ${accent}`,\n        boxShadow:`0 10px 26px -16px ${accent}`,\n      },\n      metrics: sec.metrics.map(m => {\n        const vals = order.map(o => m[o[0]]);\n        const present = vals.filter(v => v !== null && v !== undefined);\n        const hasData = present.length > 0;\n        let maxAbs = hasData ? Math.max(...present.map(x => Math.abs(x))) : 1;\n        if (!maxAbs) maxAbs = 1;\n        const col = SOLID[m.status];\n\n        const bars = order.map((o, i) => {\n          const v = m[o[0]];\n          const has = v !== null && v !== undefined;\n          let pct = has ? Math.abs(v) / maxAbs * SCALE : 0;\n          if (has && pct < 2) pct = 2;\n          const isT = o[0] === 'tg';\n          return {\n            short: o[1],\n            fillStyle: has ? {\n              position:'absolute', left:0, right:0, bottom:0, height:pct + '%',\n              borderRadius:'5px 5px 2px 2px',\n              background: isT ? 'rgba(100,116,139,0.16)' : col,\n              border: isT ? '1px solid rgba(100,116,139,0.42)' : 'none',\n              boxShadow: isT ? 'none' : 'inset 0 1px 0 rgba(255,255,255,0.35)',\n              transformOrigin:'bottom',\n              animation: `barIn .55s cubic-bezier(.2,.85,.25,1) ${0.04 * i}s both`,\n            } : { display:'none' },\n          };\n        });\n\n        const tg = m.tg;\n        const hasTg = tg !== null && tg !== undefined;\n        const tpct = hasTg ? Math.min(Math.abs(tg) / maxAbs * SCALE, SCALE) : 0;\n\n        const rows = order.map(o => {\n          const isT = o[0] === 'tg';\n          return {\n            label: o[2],\n            value: fmt(m.type, m[o[0]]),\n            rowStyle: {\n              display:'flex', alignItems:'center', justifyContent:'space-between',\n              padding:'4px 8px', margin:'0 -4px', borderRadius:'6px',\n              background: isT ? 'rgba(75,13,128,0.07)' : 'transparent',\n            },\n            labelStyle: {\n              fontSize:'12.5px', fontWeight: isT ? 700 : 500,\n              color: isT ? '#4b0d80' : '#6a7589',\n            },\n          };\n        });\n\n        const rgb = RGB[m.status];\n        return {\n          name: m.name,\n          statusLabel: STAT[m.status],\n          pillStyle: {\n            flexShrink:0, fontSize:'10.5px', fontWeight:800, letterSpacing:'.04em',\n            textTransform:'uppercase', padding:'4px 9px', borderRadius:'999px',\n            color: SOLID[m.status], background:`rgba(${rgb},0.12)`, border:`1px solid rgba(${rgb},0.30)`,\n          },\n          bars, hasData, noData: !hasData,\n          showLine: showTargetLine && hasTg && hasData,\n          lineStyle: {\n            position:'absolute', left:'2px', right:'2px', bottom: tpct + '%',\n            borderTop:'1.5px dashed rgba(75,13,128,0.38)', pointerEvents:'none',\n          },\n          rows,\n        };\n      }),\n    }));\n\n    const legend = [\n      { label:'On Track', color: SOLID.green },\n      { label:'Watch',    color: SOLID.amber },\n      { label:'Off Track',color: SOLID.red },\n    ].map(l => ({ label: l.label, dotStyle: { width:'9px', height:'9px', borderRadius:'50%', background:l.color, boxShadow:`0 0 0 3px ${l.color}1f` } }));\n\n    return { sections, legend, chartHpx: chartHeight + 'px' };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
